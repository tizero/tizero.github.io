name: "Publish"
on:
  push:
    branches: main

permissions:
  contents: write
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Doom Emacs
        uses: doomemacs/ci@legacy
      - name: Test env
        run: doom version
