name: Build with Org mode and deploy to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Install Emacs
        run: apt-get install -y emacs-nox
        

