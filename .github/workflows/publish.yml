name: Build and publish with Org mode

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: 28.1
      - name: Clone Doom to ~/.emacs.d
        run: git clone --depth 1 https://github.com/hlissner/doom-emacs ~/.emacs.d
      - name: Get Doom's version
        id: doom-version
        run: cd ~/.config/emacs && echo "doom_hash=$(git log -1 | head -1 | awk '"'"'{print substr($2,1,8)}'"'"')" >> $GITHUB_ENV
          
