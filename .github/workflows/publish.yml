name: Build with Org mode and deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-20.04 # change to -latest when possible
    container:
      image: ghcr.io/tecosaur/emacs-config:latest
      options: --user 0 # root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}
    steps:
      - uses: actions/checkout@v3
      - uses: purcell/setup-emacs@master
        with:
          version: 28.1
      - uses: actions/checkout@v3
        with:
          repository: doomemacs/doomemacs
          path: .emacs.d
      - shell: bash
        run: |
          perl -MCwd -le 'print Cwd::abs_path shift' .emacs.d/bin >> $GITHUB_PATH
      - uses: actions/cache@v3
        with:
          path: .emacs.d/.local/straight/repos
          key: build-${{ hashFiles('.emacs.d/**/packages.el', '.gihub/init.el') }}
      - run: doom sync
