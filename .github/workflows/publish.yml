name: Build and publish with Org mode

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

oncurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: 28.1
      - name: Print Emacs version
        run: emacs --version
          
